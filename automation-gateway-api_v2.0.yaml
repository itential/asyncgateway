          schema:
            type: string
        - name: order
          in: query
          description: Ascending/Descending sort indication
          schema:
            type: string
            default: ascending
            enum:
              - ascending
              - descending
        - name: detail
          in: query
          description: Select between full detail or summary for each item
          schema:
            type: string
            default: summary
            enum:
              - full
              - summary
      responses:
        '200':
          description: get scripts response
          content:
            application/json:
              schema:
                required:
                  - data
                  - meta
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScriptSummary'
              example:
                meta:
