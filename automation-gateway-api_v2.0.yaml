            set
          schema:
            type: integer
        - name: limit
          in: query
          description: The number of items to return
          schema:
            type: integer
        - name: filter
          in: query
          description: >
            Response filter function with JSON name/value pair argument, i.e.,
            contains({"name":"sample"})

