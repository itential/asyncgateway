openapi: 3.0.3
info:
  title: '{{title}}'
  version: '2.0'
servers:
- url: /api/v2.0
paths:
  /login:
    post:
      tags:
      - Authentication
      summary: Log in to the AG server
      description: Log in to the AG server.
      operationId: automation_gateway.api_v2.auth.login
      requestBody:
        x-body-name: credentials
        description: Login Credentials
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginCredentials'
      responses:
        '200':
          description: login response
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Invalid username or password.
          content:
            application/json:
              schema:
                type: object
              example:
                code: 401
                message: "Invalid username or password"

  /logout:
    post:
      tags:
      - Authentication
      summary: Log out of the AG server
      description: Log out of the AG server.
      operationId: automation_gateway.api_v2.auth.logout
      responses:
        '200':
          description: logout response
          content:
            text/plain:
              schema: 
                type: string

  /account/{account_name}/change_password:
    post:
      tags:
      - Authentication
      summary: Update user login credentials
      description: Update user login credentials.
      operationId: automation_gateway.api_v2.account.post
      parameters:
        - name: account_name
          in: path
          description: Name of account
          required: true
          schema:
            type: string
      requestBody:
        x-body-name: password_change
        description: Old/New Passwords
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChange'
        required: true
      responses:
        '200':
          description: password change response
        '401':
          description: Authentication Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                AuthenticationError:
                  $ref: '#/components/examples/AuthenticationError'

  /accounts:
    get:
      tags:
      - Accounts
      summary: Get list of user accounts
      description: Get a list of user accounts.
      parameters:
        - name: offset
          in: query
          description: >-
            The number of items to skip before starting to collect the result
            set
          schema:
            type: integer
        - name: limit
          in: query
          description: The number of items to return
          schema:
            type: integer
        - name: filter
          in: query
          description: >
            Response filter function with JSON name/value pair argument, i.e.,
            contains({"username":"admin"})

            Valid filter functions - contains, equals, startswith, endswith
          schema:
            type: string
        - name: order
          in: query
          description: Ascending/Descending sort indication
          schema:
            type: string
            default: ascending
            enum:
              - ascending
              - descending
      responses:
        '200':
          description: get accounts response
          content:
            application/json:
              schema:
                required:
                  - data
                  - meta
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Account'
        '400':
          description: Bad Request Errors
          content:
            application/json:
              schema:
                type: object
              example:
                code: 400
                message: "Invalid JSON in account filter"
    post:
      tags:
      - Accounts
      summary: Add a new user account
      description: Add a new user account.
      requestBody:
        description: Account definition
        x-body-name: account
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountParameters'
        required: true
      responses:
        '200':
          description: Returns user account that was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '409':
          description: Duplicate Name Error (resource with same name already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Duplicate:
                  $ref: '#/components/examples/Duplicate'

  /accounts/{account_name}:
    parameters:
      - name: account_name
        in: path
        description: Name of user account
        required: true
        schema:
          type: string
    get:
      tags:
      - Accounts
      summary: Get user account information
      description: Get information for a user account.
      responses:
        '200':
          description: Account information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: 404 Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'
    put:
      tags:
      - Accounts
      summary: Update user account information
      description: Update details of a user account.
      requestBody:
        description: Account Details
        x-body-name: account_info
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateParameters'
        required: true
      responses:
        '200':
          description: Account information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Account'
        '404':
          description: 404 Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'
    delete:
      tags:
      - Accounts
      summary: Delete a user account
      description: Delete a user account.
      responses:
        '200':
          description: Message indicating account has been deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedMessage'
              examples:
                Deleted:
                  $ref: '#/components/examples/Deleted'

  /accounts/{account_name}/update_password:
    post:
      tags:
      - Accounts
      summary: Update user login credentials
      description: Update user login credentials.
      operationId: automation_gateway.api_v2.accounts.update_password
      parameters:
        - name: account_name
          in: path
          description: Name of user account
          required: true
          schema:
            type: string
      requestBody:
        x-body-name: password_update
        description: Old/New Passwords
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasswordChange'
        required: true
      responses:
        '200':
          description: password change response
        '401':
          description: Authentication Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                AuthenticationError:
                  $ref: '#/components/examples/AuthenticationError'

  /accounts/{account_name}/confirm_eula:
    post:
      tags:
      - Accounts
      summary: Confirm EULA for account
      description: Confirm EULA for account.
      operationId: automation_gateway.api_v2.accounts.confirm_eula
      parameters:
        - name: account_name
          in: path
          description: Name of user account
          required: true
          schema:
            type: string
      responses:
        '200':
          description: EULA confirmation response
        '401':
          description: Authentication Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                AuthenticationError:
                  $ref: '#/components/examples/AuthenticationError'

  /status:
    get:
      tags:
      - System
      summary: Get the AG server status
      description: Get the AG server status (version, ansible version, etc).
      responses:
        '200':
          description: login response
          content: 
            application/json:
              schema:
                type: object
              example:
                version: "1.2.3"
                ansible_version: "4.5.6"

  /openapi_spec:
    get:
      tags: 
      - System
      summary: Get the AG APIs
      description: Get the current OpenAPI spec from the running instance of IAG
      responses:
        '200':
          description: returns openapi spec
          content:
            application/json:
              schema:
                type: object
              example:
                swagger: "2.0"
                basepath: "/api/v2.0"

  /poll:
    get:
      tags:
      - System
      summary: Poll AG server health
      description: Determine if AG server is up and running.
      responses:
        '200':
          description: get system health response
          content:
            application/json:
              schema:
                type: object
                $ref: '#/components/schemas/Health'
              example:
                success: true
                hostname: automation-gateway-host
                serviceId: b3-33-00-00-89-01:8083

  /audit:
    get:
      tags:
      - System
      summary: Retrieve execution audit log
      description: Retrieve execution audit log persisted in the database.
      parameters:
        - name: offset
          in: query
          description: >-
            The number of items to skip before starting to collect the result
            set
          schema:
            type: integer
        - name: limit
          in: query
          description: The number of items to return
          schema:
            type: integer
        - name: order
          in: query
          description: >-
            Most recent execution on top of returned results unless user
            specifies ascending
          schema:
            type: string
            default: descending
            enum:
              - ascending
              - descending
      responses:
        '200':
          description: audit log results
          content:
            application/json:
              schema:
                required:
                  - data
                  - meta
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Audit'
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'

  # execution_history
  /exec_history/{audit_id}:
    get:
      tags:
      - System
      summary: Get execution history payload
      description: Get execution history payload.
      parameters:
        - name: audit_id
          in: path
          description: audit id of execution
          required: true
          schema:
            type: string
      responses:
        '200':
          description: execution log event payload
          content:
            application/json:
              schema:
                type: object
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'

  /devices:
    get:
      tags:
      - Devices
      summary: Get list of Ansible devices
      description: Get a list of Ansible devices.
      parameters:
        - name: offset
          in: query
          description: >-
            The number of items to skip before starting to collect the result
            set
          schema:
            type: integer
        - name: limit
          in: query
          description: The number of items to return
          schema:
            type: integer
        - name: filter
          in: query
          description: >
            Response filter function with JSON name/value pair argument, i.e.,
            contains({"name":"ios"})

            Valid filter functions - contains, equals, startswith, endswith
          schema:
            type: string
        - name: order
          in: query
          description: Ascending/Descending sort indication
          schema:
            type: string
            default: ascending
            enum:
              - ascending
              - descending
        - name: standalone
          in: query
          description: Return only devices that don't belong to any group
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: get devices response
          content:
            application/json:
              schema:
                required:
                  - data
                  - meta
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
              example:
                meta:
                  count: 2
                  queryObject:
                    filter: {}
                    order: ascending
                  total_count: 5000
                data:
                  - name: ios_host
                    variables:
                      ansible_host: 192.168.32.79
                      ansible_network_os: ios
                      ansible_connection: network_cli
                  - name: junos_host
                    variables:
                      ansible_host: 192.168.32.80
                      ansible_network_os: junos
                      ansible_connection: network_cli
        '400':
          description: Bad Request Error
          content:
            application/json:
              schema:
                type: object
              example:
                code: 400
                message: "Invalid JSON in device filter"

    post:
      tags:
      - Devices
      summary: Add a new device to Ansible inventory
      description: Add a new device to Ansible inventory.
      requestBody:
        x-body-name: device
        description: Device definition
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Device'
        required: true
      responses:
        '200':
          description: Returns device that was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
              example:
                name: eos_host
                variables:
                  ansible_host: 192.168.32.79
                  ansible_network_os: eos
                  ansible_connection: network_cli
        '409':
          description: Duplicate Name Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                Duplicate:
                  $ref: '#/components/examples/Duplicate'

  /devices/{device_name}:
    get:
      tags:
      - Devices
      summary: Get information for an Ansible device
      description: Get information for an Ansible device.
      parameters:
        - name: device_name
          in: path
          description: Name of device
          required: true
          schema:
            type: string
        - name: output
          in: query
          description: Return a list of this device name if device exists.
          schema:
            type: string
            enum:
              - list
      responses:
        '200':
          description: Device information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
              example:
                name: eos_host
                variables:
                  ansible_host: 192.168.32.79
                  ansible_network_os: eos
                  ansible_connection: network_cli
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'
    put:
      tags:
      - Devices
      summary: Replace variables for a device in Ansible inventory
      description: Replace the variables for a device in the Ansible inventory.
      parameters:
        - name: device_name
          in: path
          description: Name of device
          required: true
          schema:
            type: string
      requestBody:
        x-body-name: device_variables
        description: Device variables
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        '200':
          description: Device information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
              example:
                name: eos_host
                variables:
                  ansible_host: 192.168.32.79
                  ansible_network_os: eos
                  ansible_connection: network_cli
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'
    delete:
      tags:
      - Devices
      summary: Delete a device from Ansible inventory
      description: Delete a device from Ansible inventory.
      parameters:
        - name: device_name
          in: path
          description: Name of device
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message indicating device has been deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedMessage'
              examples:
                Deleted:
                  $ref: '#/components/examples/Deleted'
    patch:
      tags:
      - Devices
      summary: Merge variables for a device in Ansible inventory
      description: Merge the variables for a device in the Ansible inventory.
      parameters:
        - name: device_name
          in: path
          description: Name of device
          required: true
          schema:
            type: string
      requestBody:
        x-body-name: device_variables
        description: Device variables
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceUpdateVariables'
        required: true
      responses:
        '200':
          description: object with variables for device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'

  /devices/{device_name}/variables:
    get:
      tags:
      - Devices
      summary: Get variables for an Ansible device
      description: Get the connection variables for an Ansible device.
      operationId: automation_gateway.api_v2.devices.get_variables
      parameters:
        - name: device_name
          in: path
          description: Name of device
          required: true
          schema:
            type: string
      responses:
        '200':
          description: object with variables for device
          content:
            application/json:
              schema:
                type: object
              example:
                ansible_host: 192.168.32.79
                ansible_network_os: eos
                ansible_connection: network_cli
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'

  /devices/{device_name}/variables/{variable_name}:
    get:
      tags:
      - Devices
      summary: Get a variable for an Ansible device
      description: Get the value of a connection variable for an Ansible device.
      operationId: automation_gateway.api_v2.devices.get_variable
      parameters:
        - name: device_name
          in: path
          description: Name of device
          required: true
          schema:
            type: string
        - name: variable_name
          in: path
          description: Name of variable
          required: true
          schema:
            type: string
      responses:
        '200':
          description: requested variable
          content:
            text/plain:
              schema:
                type: string
              example: 192.168.32.79
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'

  /devices/{device_name}/state:
    get:
      tags:
      - Devices
      summary: Get connectivity state for an Ansible device
      description: Get the connectivity state for an Ansible device.
      operationId: automation_gateway.api_v2.devices.get_state
      parameters:
        - name: device_name
          in: path
          description: Name of device
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object with connectivity state for device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Connection'
              examples: 
                connected:
                  value:
                    connectivity: true
                connection error:
                  value:
                    connectivity: false
                    error:
                      msg: Could not open socket to 192.168.32.99:830
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'
        '500':
          description: Internal Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                ServerError:
                  $ref: '#/components/examples/ServerError'
  
  # Groups
  /groups:
    get:
      tags:
      - Groups
      summary: Get list of Ansible device groups
      description: Get a list of Ansible device groups.
      parameters:
        - name: offset
          in: query
          description: >-
            The number of items to skip before starting to collect the result
            set
          schema:
            type: integer
        - name: limit
          in: query
          description: The number of items to return
          schema:
            type: integer
        - name: filter
          in: query
          description: >
            Response filter function with JSON name/value pair argument, i.e.,
            contains({"name":"atlanta"})

            Valid filter functions - contains, equals, startswith, endswith
          schema:
            type: string
        - name: order
          in: query
          description: Ascending/Descending sort indication
          schema:
            type: string
            default: ascending
            enum:
              - ascending
              - descending
        - name: summary
          in: query
          description: Return lightweight group data without children arrays for better performance
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: get groups response
          content:
            application/json:
              schema:
                required:
                  - data
                  - meta
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Group'
              example:
                meta:
                  count: 2
                  queryObject:
                    filter: {}
                    order: ascending
                data:
                  - name: routers
                    variables:
                      ntp_server: ntp.atlanta.example.com
                    devices:
                      - router_host1
                      - router_host2
                    childGroups:
                      - atlanta
                      - concord
                  - name: vpns
                    variables:
                      proxy: proxy.example.com
                    devices:
                      - vpn_host1
                      - vpn_host2
        '400':
          description: Bad Request Error
          content:
            application/json:
              schema:
                type: object
              example:
                code: 400
                message: "Invalid JSON in group filter"
    post:
      tags:
      - Groups
      summary: Add a new Ansible device group
      description: Add a new Ansible device group.
      requestBody:
        x-body-name: group
        description: Group definition.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Group'
        required: true
      responses:
        '200':
          description: Returns group that was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                name: routers
                variables:
                  ntp_server: ntp.atlanta.example.com
                devices:
                  - router_host1
                  - router_host2
                childGroups:
                  - atlanta
                  - concord
        '409':
          description: Duplicate Name Error (resource with same name already exists)
          content:
            application/json:
              schema:
                type: object
              examples:
                Duplicate:
                  $ref: '#/components/examples/Duplicate'
                InvalidGroup:
                  $ref: '#/components/examples/InvalidGroup'
                InvalidDevice:
                  value:
                    code: 409
                    message: "Unable to find devices: sample1, sample2"

  /groups/{group_name}:
    get:
      tags:
      - Groups
      summary: Get an Ansible device group
      description: Get information for an Ansible device group.
      parameters:
        - name: group_name
          in: path
          description: Name of group
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Group information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                name: routers
                variables:
                  ntp_server: ntp.atlanta.example.com
                devices:
                  - router_host1
                  - router_host2
                childGroups:
                  - atlanta
                  - concord
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'
    put:
      tags:
      - Groups
      summary: Update variables in an Ansible device group
      description: Update the variables in an Ansbile device group.
      parameters:
        - name: group_name
          in: path
          description: Name of group
          required: true
          schema:
            type: string
      requestBody:
        x-body-name: group_variables
        description: Group variables
        content:
          application/json:
            schema:
              type: object
        required: true
      responses:
        '200':
          description: Group information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                name: routers
                variables:
                  ntp_server: ntp.atlanta.example.com
                  proxy: proxy.example.com
        '404':
          description: Not Found Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                NotFoundError:
                  $ref: '#/components/examples/NotFoundError'
    delete:
      tags:
      - Groups
      summary: Delete an Ansible device group
      description: Delete an Ansible device group.
      parameters:
        - name: group_name
          in: path
          description: Name of group
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Message indicating group has been deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeletedMessage'
              examples:
                Deleted:
                  $ref: '#/components/examples/Deleted'

  /groups/{group_name}/devices:
    get:
      tags:
      - Groups
      summary: Get devices for an Ansible device group
      description: Get the devices for an Ansible device group.
