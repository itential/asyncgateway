    NetmikoSendCommandExecuteBody:
      required:
        - command_string
        - host
      type: object
      properties:
        host:
          type: string
          description: netmiko device name
          example: cisco_device
        command_string:
          type: string
          description: The command to be executed on the remote device
          example: show version
        expect_string:
          type: string
          description: >-
            Regular expression pattern to use for determining end of output. If
            left blank will default to being based on router prompt.
        delay_factor:
          type: integer
          description: Multiplying factor used to adjust delays (default to 1).
        max_loops:
          type: integer
          description: >-
            Controls wait time in conjunction with delay_factor. Will default to
            be based upon the timeout in netmiko device
        strip_prompt:
          type: boolean
          description: Remove the trailing router prompt from the output (default to True).
        strip_command:
          type: boolean
          description: Remove the echo of the command from the output (default to True).
        normalize:
          type: boolean
          description: Ensure the proper enter is sent at end of command (default to True).
        use_textfsm:
          type: boolean
          description: Process command output through TextFSM template (default to False).
        textfsm_template:
          type: string
          description: >-
            Name of template to parse output with; can be fully qualified path,
            relative path, or name of file in current directory. (default to
            None).
        use_ttp:
          type: boolean
          description: Process command output through TTP template (default to False).
        ttp_template:
          type: string
          description: >-
            Name of template to parse output with; can be fully qualified path,
            relative path, or name of file in current directory. (default to
            None).
        use_genie:
          type: boolean
          description: >-
            Process command output through PyATS/Genie parser (default to
            False).
        cmd_verify:
          type: boolean
          description: Verify command echo before proceeding (default to True).
