components:
  schemas:
    Meta:
      required:
        - count
        - queryObject
      type: object
      properties:
        count:
          type: integer
        queryObject:
          $ref: '#/components/schemas/QueryObject'
    QueryObject:
      required:
        - filter
        - limit
        - offset
        - order
      type: object
      properties:
        offset:
          type: integer
        limit:
          type: integer
        filter:
          type: object
          properties: {}
        order:
          type: string
        detail:
          type: string
    Health:
      required:
        - hostname
        - serviceId
        - success
      type: object
      properties:
        success:
          type: boolean
        hostname:
          type: string
        serviceId:
          type: string
    # Begin grpc parameters
    grpcPingParameters:
      required:
        - host
        - destination
        - count
      type: object
      properties:
        host:
          type: string
        destination:
          type: string
        count:
          type: integer
        do_not_fragment: 
          type: boolean
        do_not_resolve:
          type: boolean
        interval: 
          type: integer
        l3protocol:
          type: string
        size:
          type: integer
        source: 
          type: string
        wait: 
          type: integer
    grpcRebootParameters:
      # COLD;       // Shutdown and restart OS and all hardware.
      # POWERDOWN  // Halt and power down, if possible.
      # HALT       // Halt, if possible.
      # WARM       // Reload configuration but not underlying hardware.
      # NSF        // Non-stop-forwarding reboot, if possible.
      # reserved 6;      // RESET method is deprecated in favor of the gNOI
      #              // FactoryReset.Start().
      # POWERUP     // Apply power, no-op if power is already on.
      required:
        - host
        - method
      type: object
      properties:
        host:
          type: string
        delay:
          type: number
        force:
          type: boolean
        message:
          type: string
        method:
          type: string
        subcomponents:
          type: array
    grpcCancelRebootParameters:
      required:
        - host
        - message
      type: object
      properties:
        host:
          type: string
        message:
          type: string
        subcomponents:
          type: array
    grpcClearLLDPParameters:
      required:
        - host
        - interface
      type: object
      properties:
        host:
          type: string
        interface:
          type: object
    grpcClearSTPParameters:
      required:
        - host
        - interface
      type: object
      properties:
        host:
          type: string
        interface:
          type: object
    grpcClearBGPNeighborParameters:
      required:
        - host
        - address
        - routing_instance
        - mode
      type: object
      properties:
        host:
          type: string
        address:
          type: string
        routing_instance:
          type: string
        mode:
          type: integer
          description: "0:SOFT, 1:SOFTIN, 2:HARD"
          enum:
            - 0
            - 1
            - 2
    grpcWakeOnLANParameters:
      required:
        - host
        - address
        - interface
        - mac_address
      type: object
      properties:
        host:
          type: string
        address:
          type: string
        interface:
          type: object
        mac_address:
          type: string
    grpcDeviceInterfaceParameters:
      required:
        - host
        - interface
      type: object
      properties:
        host:
          type: string
        interface:
          type: array
    grpcNeighborDiscoveryParameters:
      required:
        - host
        - protocol
        - address
      type: object
      properties:
        host:
          type: string
        protocol:
          type: string
        address:
          type: string
    grpcRebootStatusParameters:
      required:
        - host
      type: object
      properties:
        host:
          type: string
        subcomponents:
          type: array
    grpcTimeParameters:
      required:
        - host
      type: object
      properties:
        host:
          type: string
    grpcTracerouteParameters:
      required:
        - host
        - destination
      type: object
      properties:
        host:
          type: string
        destination:
          type: string
        source:
          type: string
        initial_ttl:
          type: number
        max_ttl:
          type: number
        wait:
          type: number
        do_not_fragment:
          type: boolean
        do_not_resolve:
          type: boolean
        l3protocol:
          type: string
    grpcSwitchCPUParameters:
      required:
        - host
        - control_processor
      type: object
      properties:
        host:
          type: string
        control_processor:
          type: string
    # TODO: Package requires a bytes field for "contents"
    # May have to code special/specific upload for this?
    grpcSetPackageParameters:
      required:
        - host
        - package
      type: object
      properties:
        host:
          type: string
        package:
          type: object
          properties:
              activate:
                type: boolean
              filename:
                type: string
              version:
                type: string
              remote_download:
                type: object
                properties:
                  path:
                    type: string
                  protocol:
                    type: string
                  credentials:
                    type: object
                    properties:
                      cleartext: 
                        type: string
                      username:
                        type: string
                      hashed:
                        type: object
                        properties:
                          hash:
                            type: string
                          method:
                            type: string
        contents:
          type: string
        hash:
          type: object
          properties:
            hash:
              type: string
            method:
              type: string
    grpcGetParameters:
      required:
        - host
        - path
      type: object
      properties:
        host:
          type: string
        path:
          type: array
          items:
            type: string
        options:
          type: object
          properties:
            datatype:
              type: string
              enum:
                - all
                - config
                - state
                - operational
            encoding:
              type: string
              enum:
                - json
                - bytes
                - proto
                - ascii
                - json_ietf
            prefix:
              type: string
            target:
              type: string
    grpcSetParameters:
      required:
        - host
      type: object
      properties:
        host:
          type: string
        delete:
          type: array
          items:
            type: string
        replace:
          type: array
          items:
            type: array
            items:
              oneOf:
                - type: string
                - type: object
        update:
          type: array
          items:
            type: array
            items:
              oneOf:
                - type: string
                - type: object
              minItems: 2
        options:
          type: object
          properties:
            encoding:
              type: string
              enum:
                - json
                - bytes
                - proto
                - ascii
                - json_ietf
    # END GRPC

    Connection:
      required:
        - connectivity
