              description: The destination port used to connect to the target device.
              example: 22
            username:
              type: string
              description: Username to authenticate against target device if required.
              example: username
            password:
              type: string
              description: Password to authenticate against target device if required.
              example: password
            vault_path:
              type: string
              description: Vault path and key for vault integration.
              example: path:key
            secret:
              type: string
              description: The enable password if target device requires one.
            verbose:
              type: boolean
              description: Enable additional messages to standard output.
            global_delay_factor:
              type: integer
              description: Multiplication factor affecting Netmiko delays (default to 1).
            use_keys:
              type: boolean
              description: Connect to target device using SSH keys.
            key_file:
              type: string
              description: Filename path of the SSH key file to use.
            passphrase:
              type: string
              description: >-
                Passphrase to use for encrypted key; password will be used for
                key decryption if not specified.
            allow_agent:
              type: boolean
              description: Enable use of SSH key-agent.
            ssh_strict:
              type: boolean
              description: >-
                Automatically reject unknown SSH host keys (default to False,
                which means unknown SSH host keys will be accepted)
            system_host_keys:
              type: boolean
              description: Load host keys from the users known_hosts file.
            alt_host_keys:
              type: boolean
              description: If `True` host keys will be loaded from the file specified in
            alt_key_file:
              type: string
              description: SSH host key file to use (if alt_host_keys=True).
            ssh_config_file:
              type: string
              description: File name of OpenSSH configuration file.
            timeout:
              type: number
              description: Connection timeout.
            session_timeout:
              type: number
              description: Set a timeout for parallel requests.
            auth_timeout:
              type: number
              description: >-
                Set a timeout (in seconds) to wait for an authentication
                response.
            banner_timeout:
              type: number
              description: Set a timeout to wait for the SSH banner (pass to Paramiko).
            keepalive:
              type: integer
              description: >-
                Send SSH keepalive packets at a specific interval, in seconds.
                Currently defaults to 0, for backwards compatibility (it will
                not attempt to keep the connection alive).
            default_enter:
              type: string
              description: Character(s) to send to correspond to enter key (default to \n).
            response_return:
              type: string
              description: >-
                Character(s) to use in normalized return data to represent enter
                key (default to \n)
            fast_cli:
              type: boolean
              description: >-
                Provide a way to optimize for performance. Converts
                select_delay_factor to select smallest of global and specific.
                Sets default global_delay_factor to .1 (default to False)
            session_log:
              type: string
              description: >-
                File path or BufferedIOBase subclass object to write the session
                log to.
            session_log_record_writes:
              type: boolean
              description: >-
                The session log generally only records channel reads due to
                eliminate command duplication due to command echo. You can
                enable this if you want to record both channel reads and channel
                writes in the log (default to False).
            session_log_file_mode:
              type: string
              description: write or append for session_log file mode (default to write)
            allow_auto_change:
              type: boolean
              description: >-
                Allow automatic configuration changes for terminal settings.
                (default to False)
            encoding:
              type: string
              description: >-
                Encoding to be used when writing bytes to the output channel.
                (default to ascii)
            auto_connect:
              type: boolean
              description: >-
                Control whether Netmiko automatically establishes the connection
                as part of the object creation (default to True).
            enable:
              type: boolean
              description: Enter enable mode.
              default: false
