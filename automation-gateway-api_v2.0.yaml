    AuthenticationError:
      description: Authentication Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: 401
            message: >-
              The specified authorization token is malformed or does not
              correspond with an active session
    BadRequest:
      description: Bad Request Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    GenericExecutionSuccess:
      description: Successful Requests Response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/GenericExecutionSuccessBody'
        Text Response:
          example:
            status: SUCCESS
            status_code: 200
            response: This is an example of a text response string.
        JSON Response:
          example:
            status: SUCCESS
            status_code: 200
            response:
              example: This is an example of a json response object.
    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
        server error:
          example:
            code: 500
            message: 'Internal server error: EXCEPTION: events missing'
    NotFoundError:
      description: Entity Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
        Not Found:
          example:
            code: 404
            message: Not Found
  examples:
    BadParameter:
      value:
        code: 400
        message: "'hosts' parameter must contain at least one device"
    MissingParameter:
      value:
        detail: "'args' is a required property"
        status: 400
        title: "Bad Request"
        type: "about:blank"
