  /inventories/{integration_type}/{inventory_name}/devices:
    get:
      tags:
      - inventory
      summary: Get list of devices in the specified inventory
      description: Get a list of devices in the specified inventory.
      operationId: automation_gateway.api_v2.inventory_devices.get_devices
      parameters:
        - name: integration_type
          in: path
          description: Name of integration_type
          required: true
          schema:
            type: string
            enum:
              - http_requests
              - netconf
              - netmiko
              - nornir
              - grpc
        - name: inventory_name
          in: path
          description: Name of inventory
          required: true
          schema:
            type: string
            enum:
              - default
        - name: offset
          in: query
          description: >-
            The number of items to skip before starting to collect the result
            set
          schema:
            type: integer
        - name: limit
          in: query
          description: The number of items to return
          schema:
            type: integer
        - name: filter
          in: query
          description: >
            Response filter function with JSON name/value pair argument, i.e.,
            contains({"name":"ios"})

            Valid filter functions - contains, equals, startswith, endswith
          schema:
            type: string
        - name: order
          in: query
          description: Ascending/Descending sort indication
          schema:
            type: string
            default: ascending
            enum:
              - ascending
              - descending
      responses:
        '200':
          description: get devices response
          content:
            application/json:
              schema:
                required:
                  - data
                  - meta
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/Meta'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
              example:
                meta:
                  count: 2
                  queryObject:
                    filter: {}
                    order: ascending
                  total_count: 5000
                data:
                  - name: ios_host
                    variables:
                      ansible_host: 192.168.32.79
                      ansible_network_os: ios
                      ansible_connection: network_cli
                  - name: junos_host
                    variables:
                      ansible_host: 192.168.32.80
                      ansible_network_os: junos
                      ansible_connection: network_cli
        '400':
          description: Bad Request Error
          content:
            application/json:
              schema:
                type: object
              example:
                code: 400
                message: "Invalid JSON in device filter"

