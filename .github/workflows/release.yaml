# ---
# Workflow: Release
#
# Triggered by pushing a version tag (e.g. v1.2.3).
# Builds the sdist and wheel, publishes to PyPI via OIDC trusted publishing,
# then creates a GitHub Release with auto-generated notes and the dist assets.
#
# Job graph: build → publish → release
#
# Secrets required: none (OIDC trusted publishing via 'pypi' environment)
# Requires: PyPI Trusted Publisher configured for this repo + workflow path.
# See: https://docs.pypi.org/trusted-publishers/adding-a-publisher/
# ---
---
name: Release

on:
  push:
    tags:
      - "v*"

# Default to read-only; jobs that need more declare it explicitly.
permissions:
  contents: read

jobs:
  # -- build
  # Builds the sdist and wheel. Full git history is required so
  # uv-dynamic-versioning can resolve the version from the tag.
  build:
    name: Build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so uv-dynamic-versioning can read the tag

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist and wheel
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # -- publish
  # Publishes to PyPI using OIDC trusted publishing — no static credentials.
  # Runs in the 'pypi' environment, which should have required-reviewer protection.
  publish:
    name: Publish to PyPI
    needs: [build]
    runs-on: ubuntu-24.04
    environment: pypi
    permissions:
      id-token: write  # required for OIDC trusted publishing
      contents: read

    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # Pinned to SHA — release/v1 is a mutable branch tag
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e  # release/v1

  # -- release
  # Creates the GitHub Release with auto-generated notes and dist assets.
  # Depends on publish so a GitHub Release is only created after PyPI succeeds.
  release:
    name: GitHub Release
    needs: [publish]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        # Pinned to SHA — third-party action with contents: write access
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe  # v2
        with:
          files: dist/*
          generate_release_notes: true
